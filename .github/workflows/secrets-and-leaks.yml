name: Secrets & leaks

on:
  push:
    branches: [master, 'claude/**']
  pull_request:
    branches: [master]

jobs:
  banned-strings:
    name: Banned-string gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # We grep the working tree, not the diff — the gate must catch
          # files added in any earlier commit on the branch.
          fetch-depth: 0
      - name: Run banned-string check
        run: bash scripts/check-banned-strings.sh

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          # No license required for public repos. We pin the action by
          # major version; the action itself is authored by the gitleaks
          # maintainers.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Scan history on push events, only diff on PRs (faster).
          args: detect --source=. --redact --no-banner
